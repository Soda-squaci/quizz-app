<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luyện Toán</title>

<style>
body {
    background: #ccc;
    text-align: center;
    font-family: Arial;
}

button {
    font-size: 22px;
    margin: 10px;
    padding: 12px 20px;
    border-radius: 10px;
}

#menu button {
    font-size: 34px;
    padding: 20px 35px;
}

#box {
    background: white;
    font-size: 42px;
    width: 260px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 12px;
}

input {
    font-size: 30px;
    padding: 10px;
    width: 200px;
    text-align: center;
    border-radius: 8px;
    background: orange;
    border: none;
}

table {
    margin: auto;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 10px;
}

th {
    background: purple;
    color: white;
}

#chartContainer {
    width: 90%;
    margin: auto;
    overflow-x: auto;
    background: white;
    border-radius: 10px;
}

canvas {
    display: block;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<h2>Luyện toán 🐍</h2>

<!-- MENU -->
<div id="menu">
    <button onclick="startGame()">Bắt đầu</button>
    <button onclick="showHistory()">Xem lại</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
    <div id="box"></div>
    <input id="answer">
    <br><br>
    <button onclick="check()">Trả lời</button>
</div>

<!-- RESULT -->
<div id="result"></div>

<!-- HISTORY -->
<div id="history" class="hidden">
    <h3>Lịch sử 📊</h3>

    <button onclick="switchMode('table')">📋 Bảng</button>
    <button onclick="switchMode('graph')">📈 Đồ thị</button>

    <table id="table">
        <tr>
            <th>Ngày</th>
            <th>Thời gian</th>
            <th>TB</th>
            <th>% đúng</th>
        </tr>
    </table>

    <div id="chartContainer">
        <canvas id="chart" height="450"></canvas>
    </div>

    <br>
    <button onclick="backMenu()">Quay lại</button>
</div>

<script>

let total = 10;
let done = 0;
let correct = 0;
let a, b;
let startTime;

/* GAME START */
function startGame() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    document.getElementById("result").innerHTML = "";

    done = 0;
    correct = 0;
    startTime = Date.now();

    nextQuestion();
}

/* NEXT */
function nextQuestion() {
    if (done >= total) {
        finishGame();
        return;
    }

    a = Math.floor(Math.random() * 90) + 10;
    b = Math.floor(Math.random() * 90) + 10;

    document.getElementById("box").innerText = a + " + " + b;

    let input = document.getElementById("answer");
    input.value = "";
    input.style.background = "orange";
    input.focus();

    done++;
}

/* CHECK */
function check() {
    let val = Number(document.getElementById("answer").value);

    if (!isNaN(val) && val === a + b) {
        correct++;
        document.getElementById("answer").value = "✅";
        document.getElementById("answer").style.background = "lightgreen";
    } else {
        document.getElementById("answer").value = "❎";
        document.getElementById("answer").style.background = "red";
    }

    setTimeout(nextQuestion, 300);
}

/* ENTER */
document.getElementById("answer").addEventListener("keydown", e => {
    if (e.key === "Enter") check();
});

/* FINISH */
function finishGame() {
    let time = (Date.now() - startTime) / 1000;
    let avg = time / total;
    let percent = Math.round((correct / total) * 100);

    document.getElementById("game").classList.add("hidden");

    document.getElementById("result").innerHTML =
        "⏱️ " + time.toFixed(2) + "s<br>" +
        "⚡ TB: " + avg.toFixed(2) + "s<br>" +
        "🎯 " + percent + "%<br><br>" +
        "<button onclick='backMenu()'>🏠 Về menu</button>";

    save(time, avg, percent);
}

/* SAVE */
function save(time, avg, percent) {
    let data = JSON.parse(localStorage.getItem("history") || "[]");

    data.push({
        date: new Date().toLocaleDateString(),
        time: Number(time.toFixed(2)),
        avg: Number(avg.toFixed(2)),
        percent: percent
    });

    localStorage.setItem("history", JSON.stringify(data));
}

/* HISTORY */
function showHistory() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("history").classList.remove("hidden");
    switchMode("table");
}

/* SWITCH MODE */
function switchMode(mode) {
    if (mode === "table") {
        document.getElementById("table").style.display = "table";
        document.getElementById("chartContainer").style.display = "none";
        showTable();
    } else {
        document.getElementById("table").style.display = "none";
        document.getElementById("chartContainer").style.display = "block";
        showGraph();
    }
}

/* TABLE */
function showTable() {
    let table = document.getElementById("table");
    table.innerHTML =
        "<tr><th>Ngày</th><th>Thời gian</th><th>TB</th><th>% đúng</th></tr>";

    let data = JSON.parse(localStorage.getItem("history") || "[]");

    data.forEach(d => {
        let row = table.insertRow();
        row.insertCell(0).innerText = d.date;
        row.insertCell(1).innerText = d.time + "s";
        row.insertCell(2).innerText = d.avg + "s";
        row.insertCell(3).innerText = d.percent + "%";
    });
}

/* GRAPH */
function showGraph() {
    let data = JSON.parse(localStorage.getItem("history") || "[]");
    let canvas = document.getElementById("chart");
    let ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (data.length === 0) return;

    canvas.width = 500 + data.length * 90;

    let w = canvas.width;
    let h = canvas.height;

    let padL = 70;
    let padR = 40;
    let padT = 40;
    let padB = 70;

    let usableW = w - padL - padR;
    let usableH = h - padT - padB;

    let stepX = data.length > 1 ? usableW / (data.length - 1) : 0;

    /* GRID */
    ctx.strokeStyle = "#ddd";
    for (let i = 0; i <= 10; i++) {
        let y = padT + (usableH / 10) * i;
        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(w - padR, y);
        ctx.stroke();
    }

    function drawLine(key, color, scale) {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;

        data.forEach((d, i) => {
            let x = padL + i * stepX;
            let y = padT + usableH - (d[key] / scale) * usableH;

            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });

        ctx.stroke();

        data.forEach((d, i) => {
            let x = padL + i * stepX;
            let y = padT + usableH - (d[key] / scale) * usableH;

            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    drawLine("time", "red", 10);
    drawLine("avg", "green", 10);
    drawLine("percent", "blue", 100);

    data.forEach((d, i) => {
        let x = padL + i * stepX;

        ctx.fillStyle = "black";
        ctx.font = "12px Arial";
        ctx.fillText(d.date, x - 20, h - 15);
    });
}

/* BACK */
function backMenu() {
    document.getElementById("history").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}

</script>

</body>
</html>
