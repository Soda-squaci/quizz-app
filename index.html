<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luyện Toán</title>

<style>
body {
    background: #ccc;
    text-align: center;
    font-family: Arial;
}

/* NÚT */
button {
    font-size: 22px;
    margin: 10px;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
}

/* NÚT MENU TO */
#menu button {
    font-size: 34px;
    padding: 20px 35px;
}

/* CÂU HỎI */
#box {
    background: white;
    color: black;
    font-size: 42px;
    width: 260px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 12px;
}

/* INPUT */
input {
    font-size: 30px;
    padding: 10px;
    width: 200px;
    text-align: center;
    border-radius: 8px;
}

table {
    margin: auto;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 10px;
}

th {
    background: purple;
    color: white;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<h2>Luyện toán 🐍</h2>

<!-- MENU -->
<div id="menu">
    <button onclick="startGame()">Bắt đầu</button>
    <button onclick="showHistory()">Lịch sử</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
    <div id="box"></div>
    <input id="answer">
    <br><br>
    <button onclick="check()">Trả lời</button>
</div>

<!-- RESULT -->
<div id="result"></div>

<!-- HISTORY -->
<div id="history" class="hidden">
    <h3>Lịch sử 📊</h3>
    <table id="table">
        <tr>
            <th>Ngày</th>
            <th>Thời gian</th>
            <th>TB</th>
            <th>% đúng</th>
        </tr>
    </table>
    <button onclick="backMenu()">Quay lại</button>
</div>

<script>
let total = 10;
let done = 0;
let correct = 0;
let a, b;
let startTime;

/* ▶️ BẮT ĐẦU GAME */
function startGame() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    document.getElementById("result").innerHTML = "";

    done = 0;
    correct = 0;
    startTime = Date.now();

    nextQuestion();
}

/* ➡️ CÂU HỎI TIẾP THEO */
function nextQuestion() {
    if (done >= total) {
        finishGame();
        return;
    }

    a = Math.floor(Math.random() * 90) + 10;
    b = Math.floor(Math.random() * 90) + 10;

    document.getElementById("box").innerText = a + " + " + b;

    let input = document.getElementById("answer");
    input.value = "";
    input.focus();

    done++;
}

/* ✔️ KIỂM TRA */
function check() {
    let val = Number(document.getElementById("answer").value);
    if (isNaN(val)) return;

    if (val === a + b) correct++;

    setTimeout(nextQuestion, 300);
}

/* 🏁 KẾT THÚC */
function finishGame() {
    let time = (Date.now() - startTime) / 1000;
    let avg = time / total;
    let percent = Math.round((correct / total) * 100);

    document.getElementById("game").classList.add("hidden");

    document.getElementById("result").innerHTML =
        "⏱️ " + time.toFixed(2) + "s<br>" +
        "⚡ TB: " + avg.toFixed(2) + "s<br>" +
        "🎯 " + percent + "%<br><br>" +
        "<button onclick='backMenu()'>🏠 Về menu</button>";

    saveResult(time, avg, percent);
}

/* 💾 LƯU */
function saveResult(time, avg, percent) {
    let data = JSON.parse(localStorage.getItem("history") || "[]");

    data.push({
        date: new Date().toLocaleDateString(),
        time: time.toFixed(2),
        avg: avg.toFixed(2),
        percent: percent
    });

    localStorage.setItem("history", JSON.stringify(data));
}

/* 📊 XEM LỊCH SỬ */
function showHistory() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("history").classList.remove("hidden");

    let table = document.getElementById("table");
    table.innerHTML =
        "<tr><th>Ngày</th><th>Thời gian</th><th>TB</th><th>% đúng</th></tr>";

    let data = JSON.parse(localStorage.getItem("history") || "[]");

    if (data.length === 0) {
        table.innerHTML += "<tr><td colspan='4'>Chưa có dữ liệu</td></tr>";
        return;
    }

    data.forEach(d => {
        let row = table.insertRow();
        row.insertCell(0).innerText = d.date;
        row.insertCell(1).innerText = d.time + "s";
        row.insertCell(2).innerText = d.avg + "s";
        row.insertCell(3).innerText = d.percent + "%";
    });
}

/* 🔙 MENU */
function backMenu() {
    document.getElementById("history").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}

/* ⌨️ ENTER = TRẢ LỜI */
document.getElementById("answer").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        check();
    }
});
</script>

</body>
</html>
