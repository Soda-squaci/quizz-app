<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luyện Toán</title>

<style>
body {
    background: #ccc;
    text-align: center;
    font-family: Arial;
}

button {
    font-size: 22px;
    margin: 10px;
    padding: 12px 20px;
    border-radius: 10px;
}

#menu button {
    font-size: 34px;
    padding: 20px 35px;
}

#box {
    background: white;
    font-size: 42px;
    width: 260px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 12px;
}

input {
    font-size: 30px;
    padding: 10px;
    width: 200px;
    text-align: center;
    border-radius: 8px;
    background: orange;
    border: none;
}

table {
    margin: auto;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 10px;
}

th {
    background: purple;
    color: white;
}

#chartContainer {
    width: 90%;
    margin: auto;
    overflow: auto;
    background: white;
    border-radius: 10px;
}

canvas {
    display: block;
    cursor: grab;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<h2>Luyện toán 🐍</h2>

<div id="menu">
    <button onclick="startGame()">Bắt đầu</button>
    <button onclick="showHistory()">Xem lại</button>
</div>

<div id="game" class="hidden">
    <div id="box"></div>
    <input id="answer">
    <br><br>
    <button onclick="check()">Trả lời</button>
</div>

<div id="result"></div>

<div id="history" class="hidden">
    <h3>Lịch sử 📊</h3>

    <button onclick="showTable()">📋 Bảng</button>
    <button onclick="showGraph()">📈 Đồ thị</button>

    <br>
    <!-- MODE -->
    <button onclick="setGraphMode('avg')">⏱️ TB</button>
    <button onclick="setGraphMode('percent')">🎯 % đúng</button>

    <table id="table">
        <tr>
            <th>Ngày</th>
            <th>Thời gian</th>
            <th>TB</th>
            <th>% đúng</th>
        </tr>
    </table>

    <div id="chartContainer">
        <canvas id="chart" height="450"></canvas>
    </div>

    <br>
    <button onclick="backMenu()">Quay lại</button>
</div>

<script>

let total = 10;
let done = 0;
let correct = 0;
let a, b;
let startTime;

let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let lastX = 0;
let lastY = 0;

let canvas;
let graphMode = "avg";

/* LOAD */
window.addEventListener("load", () => {
    canvas = document.getElementById("chart");
});

/* GAME */
function startGame() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    document.getElementById("result").innerHTML = "";

    done = 0;
    correct = 0;
    startTime = Date.now();

    nextQuestion();
}

function nextQuestion() {
    if (done >= total) return finishGame();

    a = Math.floor(Math.random() * 90) + 10;
    b = Math.floor(Math.random() * 90) + 10;

    document.getElementById("box").innerText = a + " + " + b;

    let input = document.getElementById("answer");
    input.value = "";
    input.style.background = "orange";
    input.focus();

    done++;
}

function check() {
    let val = Number(document.getElementById("answer").value);

    if (!isNaN(val) && val === a + b) {
        correct++;
        document.getElementById("answer").value = "✅";
        document.getElementById("answer").style.background = "lightgreen";
    } else {
        document.getElementById("answer").value = "❎";
        document.getElementById("answer").style.background = "red";
    }

    setTimeout(nextQuestion, 300);
}

document.getElementById("answer").addEventListener("keydown", e => {
    if (e.key === "Enter") check();
});

/* FINISH */
function finishGame() {
    let time = (Date.now() - startTime) / 1000;
    let avg = time / total;
    let percent = Math.round((correct / total) * 100);

    document.getElementById("game").classList.add("hidden");

    document.getElementById("result").innerHTML =
        "⏱️ " + time.toFixed(2) + "s<br>" +
        "⚡ TB: " + avg.toFixed(2) + "s<br>" +
        "🎯 " + percent + "%<br><br>" +
        "<button onclick='backMenu()'>🏠 Về menu</button>";

    save(time, avg, percent);
}

function save(time, avg, percent) {
    let data = JSON.parse(localStorage.getItem("history") || "[]");

    data.push({
        date: new Date().toLocaleDateString(),
        time: Number(time.toFixed(2)),
        avg: Number(avg.toFixed(2)),
        percent
    });

    localStorage.setItem("history", JSON.stringify(data));
}

/* HISTORY */
function showHistory() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("history").classList.remove("hidden");
    showTable();
}

/* TABLE */
function showTable() {
    document.getElementById("table").style.display = "table";
    document.getElementById("chartContainer").style.display = "none";

    let table = document.getElementById("table");
    table.innerHTML =
        "<tr><th>Ngày</th><th>Thời gian</th><th>TB</th><th>% đúng</th></tr>";

    let data = JSON.parse(localStorage.getItem("history") || "[]");

    data.forEach(d => {
        let row = table.insertRow();
        row.insertCell(0).innerText = d.date;
        row.insertCell(1).innerText = d.time + "s";
        row.insertCell(2).innerText = d.avg + "s";
        row.insertCell(3).innerText = d.percent + "%";
    });
}

/* MODE */
function setGraphMode(mode) {
    graphMode = mode;
    showGraph();
}

/* GRAPH */
function showGraph() {

    document.getElementById("table").style.display = "none";
    document.getElementById("chartContainer").style.display = "block";

    let data = JSON.parse(localStorage.getItem("history") || "[]");
    if (!canvas) canvas = document.getElementById("chart");

    let ctx = canvas.getContext("2d");

    canvas.width = 800 + data.length * 90;
    canvas.height = 450;

    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (data.length === 0) return;

    let w = canvas.width;
    let h = canvas.height;

    let padL = 70;
    let padT = 40;
    let padB = 70;

    let usableW = w - padL - 40;
    let usableH = h - padT - padB;

    let stepX = data.length > 1 ? usableW / (data.length - 1) : 0;

    /* GRID */
    ctx.strokeStyle = "#ddd";
    ctx.fillStyle = "black";
    ctx.font = "12px Arial";

    for (let i = 0; i <= 10; i++) {
        let y = padT + (usableH / 10) * i;

        let value = graphMode === "percent"
            ? Math.round(100 - i * 10)
            : (10 - i).toFixed(1);

        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(w - 40, y);
        ctx.stroke();

        ctx.fillText(value, 10, y + 4);
    }

    function drawLine(key, color, scale) {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;

        data.forEach((d,i)=>{
            let x = padL + i * stepX + offsetX;
            let y = padT + usableH - (d[key]/scale)*usableH + offsetY;

            if(i===0) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);
        });

        ctx.stroke();

        data.forEach((d,i)=>{
            let x = padL + i * stepX + offsetX;
            let y = padT + usableH - (d[key]/scale)*usableH + offsetY;

            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x,y,5,0,Math.PI*2);
            ctx.fill();
        });
    }

    if (graphMode === "avg") drawLine("avg","green",10);
    if (graphMode === "percent") drawLine("percent","blue",100);

   /* DATE + VALUE */
data.forEach((d,i)=>{
    let x = padL + i * stepX + offsetX;

    let yDate = padT + usableH + 25 + offsetY;
    let yValue = yDate + 15;

    ctx.font = "12px Arial";

    // ngày
    ctx.fillStyle = "black";
    ctx.fillText(d.date, x - 25, yDate);

    // giá trị dưới ngày
    let text;

    if (graphMode === "percent") {
        text = d.percent + "%";
        ctx.fillStyle = "blue";
    } else {
        text = d.avg + "s";
        ctx.fillStyle = "green";
    }

    ctx.fillText(text, x - 15, yValue);
});

/* DRAG */
canvas.addEventListener("mousedown",e=>{
    isDragging=true;
    lastX=e.clientX;
    lastY=e.clientY;
});

window.addEventListener("mouseup",()=>isDragging=false);

window.addEventListener("mousemove",e=>{
    if(!isDragging) return;

    offsetX+=e.clientX-lastX;
    offsetY+=e.clientY-lastY;

    lastX=e.clientX;
    lastY=e.clientY;

    showGraph();
});

function backMenu(){
    document.getElementById("history").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}

</script>

</body>
</html>
