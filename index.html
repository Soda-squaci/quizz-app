<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luyện Toán PRO MAX++</title>

<style>
body {
    background: #ccc;
    text-align: center;
    font-family: Arial;
}

button {
    font-size: 22px;
    margin: 10px;
    padding: 12px 20px;
    border-radius: 10px;
}

#menu button {
    font-size: 34px;
    padding: 20px 35px;
}

#box {
    background: white;
    font-size: 42px;
    width: 260px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 12px;
}

input {
    font-size: 30px;
    padding: 10px;
    width: 200px;
    text-align: center;
    border-radius: 8px;
    background: orange;
    border: none;
}

#chartContainer {
    width: 90%;
    margin: auto;
    overflow-x: auto;
    background: white;
    border-radius: 10px;
    position: relative;
}

canvas {
    display: block;
}

#tooltip {
    position: absolute;
    background: black;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 14px;
    pointer-events: none;
    display: none;
}

.hidden { display: none; }
</style>
</head>

<body>

<h2>Luyện toán 🚀</h2>

<div id="menu">
    <button onclick="startGame()">Bắt đầu</button>
    <button onclick="showHistory()">Xem lại</button>
</div>

<div id="game" class="hidden">
    <div id="box"></div>
    <input id="answer">
    <br><br>
    <button onclick="check()">Trả lời</button>
</div>

<div id="result"></div>

<div id="history" class="hidden">
    <h3>Lịch sử 📊</h3>

    <button onclick="showGraph()">📈 Đồ thị</button>
    <button onclick="setGraphMode('avg')">⏱️ TB</button>
    <button onclick="setGraphMode('percent')">🎯 % đúng</button>

    <div id="chartContainer">
        <canvas id="chart" height="450"></canvas>
        <div id="tooltip"></div>
    </div>

    <br>
    <button onclick="backMenu()">Quay lại</button>
</div>

<script>

const menu = document.getElementById("menu");
const game = document.getElementById("game");
const historyDiv = document.getElementById("history");
const box = document.getElementById("box");
const answer = document.getElementById("answer");
const result = document.getElementById("result");
const canvas = document.getElementById("chart");
const tooltip = document.getElementById("tooltip");

let total = 10, done = 0, correct = 0;
let a, b, startTime;

let graphMode = "avg";
let zoom = 1;

/* GAME */
function startGame(){
    menu.classList.add("hidden");
    game.classList.remove("hidden");
    result.innerHTML="";
    done=0; correct=0;
    startTime=Date.now();
    nextQuestion();
}

function nextQuestion(){
    if(done>=total) return finishGame();
    a=Math.floor(Math.random()*90)+10;
    b=Math.floor(Math.random()*90)+10;
    box.innerText=a+" + "+b;
    answer.value="";
    answer.focus();
    done++;
}

function check(){
    let val=Number(answer.value);
    if(val===a+b){
        correct++;
        answer.style.background="lightgreen";
    } else answer.style.background="red";
    setTimeout(nextQuestion,300);
}

answer.addEventListener("keydown",e=>{
    if(e.key==="Enter") check();
});

/* FINISH */
function finishGame(){
    let time=(Date.now()-startTime)/1000;
    let avg=time/total;
    let percent=Math.round((correct/total)*100);

    game.classList.add("hidden");

    result.innerHTML=
    `⏱️ ${time.toFixed(2)}s<br>
     ⚡ ${avg.toFixed(2)}s<br>
     🎯 ${percent}%<br>
     <button onclick="backMenu()">Menu</button>`;

    save(time,avg,percent);
}

function save(time,avg,percent){
    let data=JSON.parse(localStorage.getItem("history")||"[]");
    data.push({
        date:new Date().toLocaleDateString(),
        avg:Number(avg.toFixed(2)),
        percent
    });
    localStorage.setItem("history",JSON.stringify(data));
}

/* HISTORY */
function showHistory(){
    menu.classList.add("hidden");
    historyDiv.classList.remove("hidden");
    showGraph();
}

function setGraphMode(m){
    graphMode=m;
    showGraph();
}

/* GRAPH */
function showGraph(){

    let data=JSON.parse(localStorage.getItem("history")||"[]");
    let ctx=canvas.getContext("2d");

    canvas.width = (800 + data.length*100)*zoom;
    canvas.height = 450;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(data.length===0) return;

    let padL=70, padT=40, padB=80;
    let usableW=canvas.width-padL-40;
    let usableH=canvas.height-padT-padB;

    let stepX=usableW/(data.length-1||1);

    // AUTO SCALE
    let maxVal=0;
    data.forEach(d=>{
        let v=graphMode==="percent"?d.percent:d.avg;
        if(v>maxVal) maxVal=v;
    });

    let scaleMax=Math.ceil(maxVal*1.2);

    // STEP đẹp
    let step = graphMode === "percent" ? 5 : 0.5;
    let niceMax = Math.ceil(scaleMax / step) * step;
    let lines = niceMax / step;

    /* GRID */
    ctx.strokeStyle = "#ddd";
    ctx.fillStyle = "black";
    ctx.font = "12px Arial";

    for (let i = 0; i <= lines; i++) {

        let value = i * step;
        let y = padT + usableH - (value / niceMax) * usableH;

        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(canvas.width - 40, y);
        ctx.stroke();

        ctx.fillText(value, 10, y + 4);
    }

    let points=[];

    data.forEach((d,i)=>{
        let val=graphMode==="percent"?d.percent:d.avg;

        let x=padL+i*stepX;
        let y=padT+usableH-(val/niceMax)*usableH;

        points.push({x,y,val,date:d.date});
    });

    // LINE
    ctx.beginPath();
    ctx.strokeStyle = graphMode==="percent"?"blue":"green";
    ctx.lineWidth=2;

    points.forEach((p,i)=>{
        if(i===0) ctx.moveTo(p.x,p.y);
        else ctx.lineTo(p.x,p.y);
    });

    ctx.stroke();

    // POINT + TEXT
    points.forEach(p=>{
        ctx.fillStyle = graphMode==="percent"?"blue":"green";

        ctx.beginPath();
        ctx.arc(p.x,p.y,5,0,Math.PI*2);
        ctx.fill();

        ctx.fillText(
            graphMode==="percent"?p.val+"%":p.val+"s",
            p.x-15,
            p.y-10
        );

        ctx.fillStyle="black";
        ctx.fillText(p.date,p.x-30,padT+usableH+20);
    });

    // TOOLTIP
    canvas.onmousemove = (e)=>{
        let rect=canvas.getBoundingClientRect();
        let mx=e.clientX-rect.left;
        let my=e.clientY-rect.top;

        let found=null;

        points.forEach(p=>{
            if(Math.abs(mx-p.x)<10 && Math.abs(my-p.y)<10){
                found=p;
            }
        });

        if(found){
            tooltip.style.display="block";
            tooltip.style.left=(found.x+10)+"px";
            tooltip.style.top=(found.y-10)+"px";

            tooltip.innerHTML =
                found.date + "<br>" +
                (graphMode==="percent"
                    ? found.val+"%"
                    : found.val+"s");
        } else {
            tooltip.style.display="none";
        }
    };
}

/* ZOOM */
canvas.addEventListener("wheel", e=>{
    e.preventDefault();
    zoom += e.deltaY < 0 ? 0.1 : -0.1;
    if(zoom<0.5) zoom=0.5;
    if(zoom>3) zoom=3;
    showGraph();
});

/* BACK */
function backMenu(){
    historyDiv.classList.add("hidden");
    menu.classList.remove("hidden");
}

</script>

</body>
</html>
