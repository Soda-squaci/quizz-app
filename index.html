<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luyện Toán</title>

<style>
body {
    background: #ccc;
    text-align: center;
    font-family: Arial;
}

/* BUTTON */
button {
    font-size: 22px;
    margin: 10px;
    padding: 12px 20px;
    border-radius: 10px;
}

/* MENU TO */
#menu button {
    font-size: 34px;
    padding: 20px 35px;
}

/* BOX */
#box {
    background: white;
    font-size: 42px;
    width: 260px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 12px;
}

/* INPUT CAM */
input {
    font-size: 30px;
    padding: 10px;
    width: 200px;
    text-align: center;
    border-radius: 8px;
    background: orange;
    border: none;
}

/* TABLE */
table {
    margin: auto;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 10px;
}

th {
    background: purple;
    color: white;
}

/* GRAPH */
canvas {
    background: white;
    margin-top: 20px;
    border-radius: 10px;
}

/* HIDE */
.hidden {
    display: none;
}
</style>
</head>

<body>

<h2>Luyện toán 🐍</h2>

<!-- MENU -->
<div id="menu">
    <button onclick="startGame()">Bắt đầu</button>
    <button onclick="showHistory()">Xem lại kết quả</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
    <div id="box"></div>
    <input id="answer">
    <br><br>
    <button onclick="check()">Trả lời</button>
</div>

<!-- RESULT -->
<div id="result"></div>

<!-- HISTORY -->
<div id="history" class="hidden">
    <h3>Lịch sử 📊</h3>

    <button onclick="showTable()">📋 Bảng</button>
    <button onclick="showGraph()">📈 Đồ thị</button>

    <table id="table">
        <tr>
            <th>Ngày</th>
            <th>Thời gian</th>
            <th>TB</th>
            <th>% đúng</th>
        </tr>
    </table>

    <canvas id="chart" width="650" height="450"></canvas>

    <br>
    <button onclick="backMenu()">Quay lại</button>
</div>

<script>

let total = 10;
let done = 0;
let correct = 0;
let a, b;
let startTime;

/* ▶ START */
function startGame() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    document.getElementById("result").innerHTML = "";

    done = 0;
    correct = 0;
    startTime = Date.now();

    nextQuestion();
}

/* ➡ NEXT */
function nextQuestion() {
    if (done >= total) {
        finishGame();
        return;
    }

    a = Math.floor(Math.random() * 90) + 10;
    b = Math.floor(Math.random() * 90) + 10;

    document.getElementById("box").innerText = a + " + " + b;

    let input = document.getElementById("answer");
    input.value = "";
    input.style.background = "orange";
    input.focus();

    done++;
}

/* ✔ CHECK */
function check() {
    let input = document.getElementById("answer");
    let val = Number(input.value);

    if (isNaN(val)) return;

    if (val === a + b) {
        correct++;
        input.value = "✅";
        input.style.background = "lightgreen";
    } else {
        input.value = "❎";
        input.style.background = "red";
    }

    setTimeout(nextQuestion, 500);
}

/* ENTER */
document.getElementById("answer").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        check();
    }
});

/* FINISH */
function finishGame() {
    let time = (Date.now() - startTime) / 1000;
    let avg = time / total;
    let percent = Math.round((correct / total) * 100);

    document.getElementById("game").classList.add("hidden");

    document.getElementById("result").innerHTML =
        "⏱️ " + time.toFixed(2) + "s<br>" +
        "⚡ TB: " + avg.toFixed(2) + "s<br>" +
        "🎯 " + percent + "%<br><br>" +
        "<button onclick='backMenu()'>🏠 Về menu</button>";

    save(time, avg, percent);
}

/* SAVE */
function save(time, avg, percent) {
    let data = JSON.parse(localStorage.getItem("history") || "[]");

    data.push({
        date: new Date().toLocaleDateString(),
        time: time.toFixed(2),
        avg: avg.toFixed(2),
        percent: percent
    });

    localStorage.setItem("history", JSON.stringify(data));
}

/* HISTORY */
function showHistory() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("history").classList.remove("hidden");

    showTable();
}

/* TABLE */
function showTable() {
    document.getElementById("table").style.display = "table";
    document.getElementById("chart").style.display = "none";

    let table = document.getElementById("table");
    table.innerHTML =
        "<tr><th>Ngày</th><th>Thời gian</th><th>TB</th><th>% đúng</th></tr>";

    let data = JSON.parse(localStorage.getItem("history") || "[]");

    data.forEach(d => {
        let row = table.insertRow();
        row.insertCell(0).innerText = d.date;
        row.insertCell(1).innerText = d.time + "s";
        row.insertCell(2).innerText = d.avg + "s";
        row.insertCell(3).innerText = d.percent + "%";
    });
}

/* GRAPH */
function showGraph() {
    document.getElementById("table").style.display = "none";
    document.getElementById("chart").style.display = "block";

    let data = JSON.parse(localStorage.getItem("history") || "[]");
    let canvas = document.getElementById("chart");
    let ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (data.length === 0) return;

    let w = canvas.width;
    let h = canvas.height;

    let top = 20;
    let bottom = 50;
    let usableH = h - top - bottom;

    let stepX = w / (data.length + 1);

    /* GRID */
    ctx.strokeStyle = "#ddd";
    ctx.lineWidth = 1;

    for (let i = 0; i <= 10; i++) {
        let y = top + (usableH / 10) * i;

        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
    }

    /* LINE */
    ctx.beginPath();
    ctx.strokeStyle = "blue";
    ctx.lineWidth = 3;

    data.forEach((d, i) => {
        let x = (i + 1) * stepX;
        let y = top + usableH - (d.percent / 100) * usableH;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });

    ctx.stroke();

    /* POINTS + DATE */
    data.forEach((d, i) => {
        let x = (i + 1) * stepX;
        let y = top + usableH - (d.percent / 100) * usableH;

        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.fillStyle = "red";
        ctx.fill();

        ctx.fillStyle = "black";
        ctx.font = "12px Arial";
        ctx.fillText(d.date, x - 25, h - 10);
    });
}

/* MENU */
function backMenu() {
    document.getElementById("history").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}

</script>

</body>
</html>
