<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luyện Toán</title>

<style>
body {
    background: #ccc;
    text-align: center;
    font-family: Arial;
}

button {
    font-size: 20px;
    margin: 8px;
    padding: 10px 18px;
    border-radius: 10px;
}

#menu button {
    font-size: 30px;
    padding: 18px 30px;
}

#box {
    background: white;
    font-size: 40px;
    width: 260px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 12px;
}

input {
    font-size: 28px;
    padding: 10px;
    width: 200px;
    text-align: center;
    border-radius: 8px;
    background: orange;
    border: none;
}

table {
    margin: auto;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 8px;
}

th {
    background: purple;
    color: white;
}

#chartContainer {
    width: 95%;
    margin: auto;
    background: white;
    border-radius: 10px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<h2>Luyện toán 🚀</h2>

<div id="menu">
    <button onclick="startGame()">Bắt đầu</button>
    <button onclick="showHistory()">Xem lại</button>
</div>

<div id="game" class="hidden">
    <div id="box"></div>
    <input id="answer">
    <br><br>
    <button onclick="check()">Trả lời</button>
</div>

<div id="result"></div>

<div id="history" class="hidden">
    <h3>Lịch sử 📊</h3>

    <button onclick="showTable()">📋 Bảng</button>
    <button onclick="showGraph()">📈 Đồ thị</button>

    <br>
    Zoom:
    <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1">

    <table id="table"></table>

    <div id="chartContainer">
        <canvas id="chart" height="450"></canvas>
    </div>

    <br>
    <button onclick="backMenu()">Quay lại</button>
</div>

<script>
const menu = document.getElementById("menu");
const game = document.getElementById("game");
const historyDiv = document.getElementById("history");
const table = document.getElementById("table");
const chartContainer = document.getElementById("chartContainer");
const box = document.getElementById("box");
const answer = document.getElementById("answer");
const result = document.getElementById("result");
const canvas = document.getElementById("chart");
const zoomSlider = document.getElementById("zoomSlider");

let zoom = 1;
let total = 10;
let done = 0;
let correct = 0;
let a, b;
let startTime;

/* FIX: slider hoạt động */
zoomSlider.addEventListener("input", e => {
    zoom = Number(e.target.value);
    showGraph();
});

/* GAME */
function startGame() {
    menu.classList.add("hidden");
    game.classList.remove("hidden");
    result.innerHTML = "";

    done = 0;
    correct = 0;
    startTime = Date.now();

    nextQuestion();
}

function nextQuestion() {
    if (done >= total) return finishGame();

    a = Math.floor(Math.random() * 90) + 10;
    b = Math.floor(Math.random() * 90) + 10;

    box.innerText = a + " + " + b;

    answer.value = "";
    answer.style.background = "orange";
    answer.focus();
}

/* ĐÚNG mới qua */
function check() {
    let val = Number(answer.value);

    if (!isNaN(val) && val === a + b) {
        correct++;
        done++;

        answer.value = "✅";
        answer.style.background = "lightgreen";

        setTimeout(nextQuestion, 300);
    } else {
        answer.value = "❎";
        answer.style.background = "red";

        setTimeout(() => {
            answer.value = "";
            answer.style.background = "orange";
            answer.focus();
        }, 500);
    }
}

answer.addEventListener("keydown", e => {
    if (e.key === "Enter") check();
});

/* FINISH */
function finishGame() {
    let time = (Date.now() - startTime) / 1000;
    let avg = time / total;

    game.classList.add("hidden");

    result.innerHTML =
        `⏱️ ${time.toFixed(2)}s<br>
         ⚡ TB: ${avg.toFixed(2)}s<br><br>
         <button onclick="backMenu()">🏠 Về menu</button>`;

    save(time, avg);
}

function save(time, avg) {
    let data = JSON.parse(localStorage.getItem("history") || "[]");

    data.push({
        date: new Date().toLocaleDateString(),
        time: Number(time.toFixed(2)),
        avg: Number(avg.toFixed(2))
    });

    localStorage.setItem("history", JSON.stringify(data));
}

/* HISTORY */
function showHistory() {
    menu.classList.add("hidden");
    historyDiv.classList.remove("hidden");
    showTable();
}

/* TABLE */
function showTable() {
    table.style.display = "table";
    chartContainer.style.display = "none";

    table.innerHTML =
        "<tr><th>Ngày</th><th>Time</th><th>TB</th></tr>";

    let data = JSON.parse(localStorage.getItem("history") || "[]");

    data.forEach(d => {
        let row = table.insertRow();
        row.insertCell(0).innerText = d.date;
        row.insertCell(1).innerText = d.time + "s";
        row.insertCell(2).innerText = d.avg + "s";
    });
}

/* GRAPH */
function showGraph() {

    table.style.display = "none";
    chartContainer.style.display = "block";

    let data = JSON.parse(localStorage.getItem("history") || "[]");
    let ctx = canvas.getContext("2d");

    canvas.width = 800 + data.length * 80;
    canvas.height = 450;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (data.length === 0) return;

    let padL = 60;
    let padT = 30;
    let padB = 70;

    let usableW = canvas.width - padL - 30;
    let usableH = (canvas.height - padT - padB) * zoom; // 🔥 zoom tại đây

    let stepX = data.length > 1 ? usableW / (data.length - 1) : 0;

    let maxVal = Math.max(...data.map(d => d.avg));
    maxVal = Math.ceil(maxVal * 2) / 2;

    let stepY = 0.5;
    let steps = maxVal / stepY;

    ctx.strokeStyle = "#ddd";
    ctx.fillStyle = "black";
    ctx.font = "12px Arial";

    for (let i = 0; i <= steps; i++) {
        let y = padT + usableH - (i / steps) * usableH;
        let value = (i * stepY).toFixed(1);

        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(canvas.width - 20, y);
        ctx.stroke();

        ctx.fillText(value, 5, y + 4);
    }

    ctx.beginPath();
    ctx.strokeStyle = "green";

    data.forEach((d,i)=>{
        let x = padL + i * stepX;
        let y = padT + usableH - (d.avg / maxVal) * usableH;

        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });

    ctx.stroke();

    data.forEach((d,i)=>{
        let x = padL + i * stepX;
        let y = padT + usableH - (d.avg / maxVal) * usableH;

        ctx.beginPath();
        ctx.arc(x,y,5,0,Math.PI*2);
        ctx.fill();

        ctx.font = "bold 14px Arial";
        ctx.fillStyle = "green";
        ctx.fillText(d.avg+"s", x-15, y-10);

        ctx.fillStyle="black";
        ctx.font="12px Arial";
        ctx.fillText(d.date, x-20, padT + usableH + 25);
    });
}

/* BACK */
function backMenu(){
    historyDiv.classList.add("hidden");
    menu.classList.remove("hidden");
}
</script>

</body>
</html>
