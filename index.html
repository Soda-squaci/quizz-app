<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luyện Toán PRO</title>

<style>
body {
    background: #ccc;
    text-align: center;
    font-family: Arial;
}

button {
    font-size: 22px;
    margin: 10px;
    padding: 12px 20px;
    border-radius: 10px;
}

#menu button {
    font-size: 34px;
    padding: 20px 35px;
}

#box {
    background: white;
    font-size: 42px;
    width: 260px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 12px;
}

input {
    font-size: 30px;
    padding: 10px;
    width: 200px;
    text-align: center;
    border-radius: 8px;
    background: orange;
    border: none;
}

table {
    margin: auto;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 10px;
}

th {
    background: purple;
    color: white;
}

#chartContainer {
    width: 90%;
    margin: auto;
    overflow: auto;
    background: white;
    border-radius: 10px;
}

canvas {
    display: block;
    cursor: grab;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<h2>Luyện toán 🚀</h2>

<div id="menu">
    <button onclick="startGame()">Bắt đầu</button>
    <button onclick="showHistory()">Xem lại</button>
</div>

<div id="game" class="hidden">
    <div id="box"></div>
    <input id="answer">
    <br><br>
    <button onclick="check()">Trả lời</button>
</div>

<div id="result"></div>

<div id="history" class="hidden">
    <h3>Lịch sử 📊</h3>

    <button onclick="showTable()">📋 Bảng</button>
    <button onclick="showGraph()">📈 Đồ thị</button>

    <br>
    <button onclick="setGraphMode('avg')">⏱️ TB</button>
    <button onclick="setGraphMode('percent')">🎯 % đúng</button>

    <table id="table"></table>

    <div id="chartContainer">
        <canvas id="chart" height="450"></canvas>
    </div>

    <br>
    <button onclick="backMenu()">Quay lại</button>
</div>

<script>
const menu = document.getElementById("menu");
const game = document.getElementById("game");
const history = document.getElementById("history");
const table = document.getElementById("table");
const chartContainer = document.getElementById("chartContainer");
const box = document.getElementById("box");
const answer = document.getElementById("answer");
const result = document.getElementById("result");
const canvas = document.getElementById("chart");

let total = 10;
let done = 0;
let correct = 0;
let a, b;
let startTime;

let offsetX = 0;
let isDragging = false;
let lastX = 0;

let scale = 1;
let mouseX = 0;
let mouseY = 0;

let graphMode = "avg";

/* GAME */
function startGame() {
    menu.classList.add("hidden");
    game.classList.remove("hidden");
    result.innerHTML = "";

    done = 0;
    correct = 0;
    startTime = Date.now();

    nextQuestion();
}

function nextQuestion() {
    if (done >= total) return finishGame();

    a = Math.floor(Math.random() * 90) + 10;
    b = Math.floor(Math.random() * 90) + 10;

    box.innerText = a + " + " + b;

    answer.value = "";
    answer.style.background = "orange";
    answer.focus();

    done++;
}

function check() {
    let val = Number(answer.value);

    if (!isNaN(val) && val === a + b) {
        correct++;
        answer.value = "✅";
        answer.style.background = "lightgreen";
    } else {
        answer.value = "❎";
        answer.style.background = "red";
    }

    setTimeout(nextQuestion, 300);
}

answer.addEventListener("keydown", e => {
    if (e.key === "Enter") check();
});

/* FINISH */
function finishGame() {
    let time = (Date.now() - startTime) / 1000;
    let avg = time / total;
    let percent = Math.round((correct / total) * 100);

    game.classList.add("hidden");

    result.innerHTML =
        `⏱️ ${time.toFixed(2)}s<br>
         ⚡ TB: ${avg.toFixed(2)}s<br>
         🎯 ${percent}%<br><br>
         <button onclick="backMenu()">🏠 Về menu</button>`;

    save(time, avg, percent);
}

function save(time, avg, percent) {
    let data = JSON.parse(localStorage.getItem("history") || "[]");

    data.push({
        date: new Date().toLocaleDateString(),
        time: Number(time.toFixed(2)),
        avg: Number(avg.toFixed(2)),
        percent
    });

    localStorage.setItem("history", JSON.stringify(data));
}

/* HISTORY */
function showHistory() {
    menu.classList.add("hidden");
    history.classList.remove("hidden");
    showTable();
}

function showTable() {
    table.style.display = "table";
    chartContainer.style.display = "none";

    table.innerHTML =
        "<tr><th>Ngày</th><th>Thời gian</th><th>TB</th><th>% đúng</th></tr>";

    let data = JSON.parse(localStorage.getItem("history") || "[]");

    data.forEach(d => {
        let row = table.insertRow();
        row.insertCell(0).innerText = d.date;
        row.insertCell(1).innerText = d.time + "s";
        row.insertCell(2).innerText = d.avg + "s";
        row.insertCell(3).innerText = d.percent + "%";
    });
}

function setGraphMode(mode) {
    graphMode = mode;
    showGraph();
}

/* GRAPH */
function showGraph() {
    table.style.display = "none";
    chartContainer.style.display = "block";

    let data = JSON.parse(localStorage.getItem("history") || "[]");
    let ctx = canvas.getContext("2d");

    canvas.width = 800 + data.length * 90;
    canvas.height = 450;

    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (data.length === 0) return;

    let padL = 70;
    let padT = 40;
    let padB = 70;

    let usableW = canvas.width - padL - 40;
    let usableH = canvas.height - padT - padB;

    let stepX = data.length > 1 ? usableW / (data.length - 1) : 0;

    let maxValue = graphMode === "percent"
        ? 100
        : Math.max(...data.map(d => d.avg));

    if (maxValue === 0) maxValue = 1;

    ctx.save();
    ctx.translate(offsetX, 0);
    ctx.scale(scale, scale);

    /* GRID */
    ctx.strokeStyle = "#ddd";
    ctx.fillStyle = "black";
    ctx.font = "12px Arial";

    for (let i = 0; i <= 10; i++) {
        let y = padT + (usableH / 10) * i;
        let value = graphMode === "percent"
            ? 100 - i * 10
            : (maxValue - (maxValue/10)*i).toFixed(1);

        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(canvas.width - 40, y);
        ctx.stroke();

        ctx.fillText(value, 10, y + 4);
    }

    function drawLine() {
        ctx.beginPath();
        ctx.strokeStyle = graphMode === "avg" ? "green" : "blue";

        data.forEach((d,i)=>{
            let x = padL + i * stepX;
            let y = padT + usableH - (d[graphMode]/maxValue)*usableH;

            if(i===0) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);
        });

        ctx.stroke();

        data.forEach((d,i)=>{
            let x = padL + i * stepX;
            let y = padT + usableH - (d[graphMode]/maxValue)*usableH;

            ctx.beginPath();
            ctx.arc(x,y,5,0,Math.PI*2);
            ctx.fill();
        });
    }

    drawLine();

    /* TOOLTIP */
    data.forEach((d,i)=>{
        let x = padL + i * stepX;
        let y = padT + usableH - (d[graphMode]/maxValue)*usableH;

        let dx = mouseX/scale - offsetX - x;
        let dy = mouseY/scale - y;

        if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
            ctx.fillStyle = "black";
            ctx.fillRect(x + 10, y - 30, 120, 30);

            ctx.fillStyle = "white";
            let text = graphMode === "percent"
                ? d.percent + "%"
                : d.avg + "s";

            ctx.fillText(d.date + " | " + text, x + 15, y - 10);
        }
    });

    ctx.restore();
}

/* DRAG */
canvas.addEventListener("mousedown", e=>{
    isDragging = true;
    lastX = e.clientX;
});

window.addEventListener("mouseup", ()=> isDragging=false);

window.addEventListener("mousemove", e=>{
    if(!isDragging) return;

    offsetX += e.clientX - lastX;
    lastX = e.clientX;

    showGraph();
});

/* ZOOM */
canvas.addEventListener("wheel", e=>{
    e.preventDefault();

    if (e.deltaY < 0) scale *= 1.1;
    else scale /= 1.1;

    scale = Math.max(0.5, Math.min(3, scale));

    showGraph();
});

/* MOUSE TRACK */
canvas.addEventListener("mousemove", e=>{
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
});

/* BACK */
function backMenu(){
    history.classList.add("hidden");
    menu.classList.remove("hidden");
}
</script>

</body>
</html>
