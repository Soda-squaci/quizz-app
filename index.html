<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luyện Toán</title>

<style>
body {
    background: #ccc;
    text-align: center;
    font-family: Arial;
}

/* 🔥 NÚT TO HƠN */
button {
    font-size: 24px;
    margin: 12px;
    padding: 15px 25px;
    border-radius: 10px;
    cursor: pointer;
}

/* BOX CÂU HỎI */
#box {
    background: white;
    color: black;
    padding: 20px;
    font-size: 40px;
    margin: 20px auto;
    width: 250px;
    border-radius: 10px;
}

/* INPUT */
input {
    background: orange;
    font-size: 30px;
    padding: 10px;
    text-align: center;
    width: 200px;
    border-radius: 8px;
}

.correct { background: lightgreen !important; }
.wrong { background: red !important; }

table {
    margin: auto;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 10px;
}

th {
    background: purple;
    color: white;
}

#result {
    white-space: pre-line;
    margin-top: 20px;
    font-size: 22px;
}

.hidden { display: none; }
</style>
</head>

<body>

<h2>Luyện toán 🐍</h2>

<!-- MENU -->
<div id="menu">
    <button onclick="start()">Bắt đầu luyện tập</button>
    <button onclick="showHistory()">Xem lại kết quả</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
    <div id="box"></div>
    <input id="ans" autofocus>
    <br><br>
    <button onclick="check()">Trả lời</button>
</div>

<!-- RESULT -->
<div id="result"></div>

<!-- HISTORY -->
<div id="history" class="hidden">
    <h3>Kết quả 📊</h3>
    <table id="table">
        <tr>
            <th>Ngày</th>
            <th>Thời gian</th>
            <th>TB</th>
            <th>% đúng</th>
        </tr>
    </table>
    <button onclick="backMenu()">Quay lại</button>
</div>

<script>
let total = 10;
let done = 0;
let correct = 0;
let a, b;
let startTime;

function start() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    document.getElementById("result").innerHTML = "";

    done = 0;
    correct = 0;
    startTime = Date.now();

    next();
}

function next() {
    if (done >= total) {
        finish();
        return;
    }

    a = Math.floor(Math.random()*90)+10;
    b = Math.floor(Math.random()*90)+10;

    document.getElementById("box").innerText = a + " + " + b;
    let input = document.getElementById("ans");
    input.value = "";

    input.className = "";
    input.focus();
}

function check() {
    let input = document.getElementById("ans");
    let val = Number(input.value);

    if (isNaN(val)) return;

    if (val === a + b) {
        correct++;
    }

    done++;
    setTimeout(next, 400);
}

function finish() {
    let time = (Date.now() - startTime)/1000;
    let avg = time / total;
    let percent = Math.round(correct/total*100);

    document.getElementById("game").classList.add("hidden");

    document.getElementById("result").innerHTML =
        "⏱️ " + time.toFixed(2) + "s\n" +
        "⚡ TB: " + avg.toFixed(2) + "s\n" +
        "🎯 " + percent + "%\n\n" +
        "<button onclick='backToMenu()'>🏠 Về menu</button>";

    save(time, avg, percent);
}

function backToMenu() {
    document.getElementById("result").innerHTML = "";
    document.getElementById("menu").classList.remove("hidden");
}

function save(time, avg, percent) {
    let data = JSON.parse(localStorage.getItem("history") || "[]");

    let now = new Date();
    data.push({
        date: now.toLocaleDateString(),
        time: time.toFixed(2),
        avg: avg.toFixed(2),
        percent: percent
    });

    localStorage.setItem("history", JSON.stringify(data));
}

function showHistory() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("history").classList.remove("hidden");

    let table = document.getElementById("table");
    table.innerHTML =
        "<tr><th>Ngày</th><th>Thời gian</th><th>TB</th><th>% đúng</th></tr>";

    let data = JSON.parse(localStorage.getItem("history") || "[]");

    if (data.length === 0) {
        table.innerHTML += "<tr><td colspan='4'>Chưa có dữ liệu</td></tr>";
        return;
    }

    data.forEach(d => {
        let row = table.insertRow();
        row.insertCell(0).innerText = d.date;
        row.insertCell(1).innerText = d.time + "s";
        row.insertCell(2).innerText = d.avg + "s";
        row.insertCell(3).innerText = d.percent + "%";
    });
}

function backMenu() {
    document.getElementById("history").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}
</script>

</body>
</html>
